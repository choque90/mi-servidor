<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Servidor</title>
  <style>
    body { font-family: Arial; background: #1a1a2e; color: white; text-align: center; padding: 40px; }

    .conectado { background: #1B5E20; }

    #mensaje { font-size: 36px; font-weight: bold; color: #4FC3F7; margin: 30px; }
    #historial { text-align: left; max-width: 500px; margin: 0 auto; }
    .msg { background: #0f3460; padding: 10px; margin: 5px; border-radius: 6px; }
    .botones { margin: 30px; }

    .btn-off { background: #B71C1C; color: white; padding: 15px 40px; font-size: 20px; border: none; border-radius: 10px; cursor: pointer; margin: 10px; }
    #estadoLED { font-size: 24px; margin: 20px; }
  </style>
</head>

  <div id="estado" class="desconectado">⚫ Desconectado</div>
  <div id="mensaje">Esperando mensaje...</div>

  <div class="botones">
    <h2>Control LED ESP32</h2>
    <button class="btn-on" onclick="controlLED('on')">💡 Encender LED</button>
    <button class="btn-off" onclick="controlLED('off')">🌑 Apagar LED</button>
    <div id="estadoLED">LED: Apagado</div>
  </div>

  <h3>Historial:</h3>
  <div id="historial"></div>
