<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Servidor</title>
  <style>
    body { font-family: Arial; background: #1a1a2e; color: white; text-align: center; padding: 40px; }
    h1 { color: #4FC3F7; }
    #estado { font-size: 20px; margin: 20px; padding: 10px; border-radius: 8px; }
    .conectado { background: #1B5E20; }
    .desconectado { background: #B71C1C; }
    #mensaje { font-size: 36px; font-weight: bold; color: #4FC3F7; margin: 30px; }
    #historial { text-align: left; max-width: 500px; margin: 0 auto; }
    .msg { background: #0f3460; padding: 10px; margin: 5px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>🖥️ Mi Servidor (Proyecto de Fiti)</h1>
  <div id="estado" class="desconectado">⚫ Desconectado</div>
  <div id="mensaje">Esperando mensaje...</div>
  <h3>Historial:</h3>
  <div id="historial"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    socket.on('connect', () => {
      document.getElementById('estado').className = 'conectado';
      document.getElementById('estado').innerHTML = '🟢 Conectado al servidor';
    });

    socket.on('disconnect', () => {
      document.getElementById('estado').className = 'desconectado';
      document.getElementById('estado').innerHTML = '⚫ Desconectado';
    });

    socket.on('mensaje', (data) => {
      document.getElementById('mensaje').innerHTML = data;
      const historial = document.getElementById('historial');
      const div = document.createElement('div');
      div.className = 'msg';
      div.innerHTML = '📨 ' + data;
      historial.prepend(div);
    });
  </script>
</body>
</html>
